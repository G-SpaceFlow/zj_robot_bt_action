                label: 动作011：手臂后移动
                service: /zj_humanoid/upperlimb/movel/dual_arm
                motion:
                  v: 0.2
                  acc: 0.1
                  is_async: false
                # /yolo_vision/wall_angle 的 base_x/base_y/base_z 会缓存为 point=base
                base_key: "1-1-0-0"
                motion_mode: 3
