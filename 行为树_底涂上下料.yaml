---
version: 1
name: plate_workflow_tree_demo
description: "底涂上下料"

tasks:
  - id: task_001
    name: plate_pick_task
    label: 任务001：下料

    locations:
      - id: loc_001
        name: pickup_station
        label: 地点001：取料台
        behaviors:
          - id: behavior_001
            name: approach_plate
            label: 行为001：靠近门
            description: 左右臂多点轨迹示例

            actions:
              - id: rotate_001
                name: move waist
                label: 转腰
                service: "/zj_humanoid/upperlimb/movej/whole_body"
                use_ik: false                          # 关键：关闭 IK
                joints:                                # 直接提供目标关节角度
                  - [3,0,0.0]               # 如腰部，按你的机器人维度填
                motion:
                  v: 0.5
                  acc: 0.05
                  t: 8.0
                  is_async: false
                  arm_type: 24

      - id: loc_002
        name: pickup_station
        label: 地点002：取料台
        nav_pose:
          service: "/bt_navigation_server/navigate_to_pose"
          x: -2.03324
          y: 0.81633
          yaw: -3.00235


        behaviors:
          - id: behavior_001
            name: approach_plate
            label: 行为001：靠近门
            description: 左右臂多点轨迹示例

            actions:
              - id: rotate_001
                name: move waist
                label: 转腰
                service: "/zj_humanoid/upperlimb/movej/whole_body"
                use_ik: false                          # 关键：关闭 IK
                joints:                                # 直接提供目标关节角度
                  - [0, 0, 0.0]               # 如腰部，按你的机器人维度填
                motion:
                  v: 0.5
                  acc: 0.05
                  t: 8.0
                  is_async: false
                  arm_type: 24


              - id: move_001
                name: base_forward
                label: open_loop_forward
                type: open_loop_motion
                motion:
                  dx: 0.1
                  linear_speed: 0.1
                  angular_speed: 0.30
                  linear_acc: 0.05
                  angular_acc: 0.35



      - id: loc_003
        name: pickup_station
        label: 地点003：取料台
        twice_move:
          service: "/bt_navigation_server/navigate_to_pose"
