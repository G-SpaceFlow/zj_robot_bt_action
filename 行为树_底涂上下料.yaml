            y: 0.78240
            yaw: -3.00037
          vision_target:
            x: 0.9868
            y: 0.0271
            yaw: -0.0425
          params: {}


        behaviors:
          - id: behavior_001
            name: approach_plate
            label: 行为001：靠近门
            description: 左右臂多点轨迹示例

