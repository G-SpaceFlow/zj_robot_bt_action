  - id: task_002
    name: plate_pick_task
    label: 任务002：上料

    locations:
      - id: loc_001
        name: pickup_station
        label: 地点001：上料台

        nav_pose:
          service: "/bt_navigation_server/navigate_to_pose"
          x: -2.72347
          y: 0.54366
          yaw: -3.09967
          action: 0
          twice_move:
            enabled: true
            trigger_value: 4
            target:
              x: -2.92201
              y: 0.53900
              yaw: -3.10391
            vision_target:
              x: 0.6585
              y: 0.0025
              yaw: 0.0332
            params: {}


        behaviors:
          - id: behavior_001
            name: approach_plate
            label: 行为001：靠近门
            description: 左右臂多点轨迹示例

            actions:
              - id: move_001
                name: base_forward
                label: open_loop_forward
                type: open_loop_motion
                motion:
                  dx: 0.1
                  linear_speed: 0.1
                  angular_speed: 0.30
                  linear_acc: 0.05
                  angular_acc: 0.35


              - id: move_002
                name: base_forward
                label: open_loop_forward
                type: open_loop_motion
                motion:
                  dx: -0.1
                  linear_speed: 0.1
                  angular_speed: 0.30
                  linear_acc: 0.05
                  angular_acc: 0.35
